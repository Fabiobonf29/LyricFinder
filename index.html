<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LyricFinder">
    <meta name="description" content="Cerca i testi delle canzoni inserendo il titolo e l'artista. Trova istantaneamente i lyrics dei tuoi brani preferiti.">
    <meta name="theme-color" content="#0a0a1a">
    <title>LyricFinder — Cerca Testi di Canzoni</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>
        <div class="bg-orb bg-orb-4"></div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
                        <path d="M16 12v12a4 4 0 1 1-2-3.46V14l10-2v10a4 4 0 1 1-2-3.46V12L16 12z" fill="url(#logoGrad2)"/>
                        <defs>
                            <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#a78bfa"/>
                                <stop offset="100%" stop-color="#6366f1"/>
                            </linearGradient>
                            <linearGradient id="logoGrad2" x1="10" y1="10" x2="30" y2="30">
                                <stop offset="0%" stop-color="#c4b5fd"/>
                                <stop offset="100%" stop-color="#818cf8"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="logo-text">LyricFinder</h1>
            </div>
            <p class="tagline">Trova i testi delle tue canzoni preferite</p>
        </header>

        <!-- Search Section -->
        <section class="search-section" id="search-section">
            <div class="search-card">
                <div class="search-card-glow"></div>
                <div class="search-card-inner">
                    <h2 class="search-title">
                        <span class="search-icon">🎵</span>
                        Cerca una canzone
                    </h2>
                    <form id="search-form" class="search-form" autocomplete="off">
                        <div class="input-group">
                            <label for="artist-input" class="input-label">Artista</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                                <input 
                                    type="text" 
                                    id="artist-input" 
                                    placeholder="es. Lucio Battisti" 
                                    required
                                    autocomplete="off"
                                >
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="title-input" class="input-label">Titolo della canzone</label>
                            <div class="input-wrapper">
                                <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 18V5l12-2v13"/>
                                    <circle cx="6" cy="18" r="3"/>
                                    <circle cx="18" cy="16" r="3"/>
                                </svg>
                                <input 
                                    type="text" 
                                    id="title-input" 
                                    placeholder="es. Emozioni" 
                                    required
                                    autocomplete="off"
                                >
                            </div>
                        </div>
                        <button type="submit" id="search-btn" class="search-btn">
                            <span class="btn-text">Cerca Testo</span>
                            <span class="btn-loader" id="btn-loader">
                                <span class="spinner"></span>
                            </span>
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Results Section -->
        <section class="results-section" id="results-section">
            <!-- Error State -->
            <div class="error-card hidden" id="error-card">
                <div class="error-icon">😔</div>
                <h3 class="error-title" id="error-title">Testo non trovato</h3>
                <p class="error-message" id="error-message">Non siamo riusciti a trovare il testo. Controlla il nome dell'artista e il titolo.</p>
                <button class="retry-btn" id="retry-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 4v6h6"/>
                        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                    </svg>
                    Riprova
                </button>
            </div>

            <!-- Lyrics Result — Split View -->
            <div class="lyrics-card hidden" id="lyrics-card">
                <div class="lyrics-header">
                    <div class="lyrics-info">
                        <h2 class="lyrics-song-title" id="lyrics-song-title"></h2>
                        <p class="lyrics-artist" id="lyrics-artist"></p>
                    </div>
                    <div class="lyrics-actions">
                        <button class="action-btn" id="copy-btn" title="Copia testo originale">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                        </button>
                        <button class="action-btn" id="copy-translation-btn" title="Copia traduzione">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
                            </svg>
                        </button>
                        <button class="action-btn action-btn-play" id="play-btn" title="Ascolta la canzone">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3" fill="currentColor" stroke="none"/>
                            </svg>
                        </button>
                        <button class="action-btn" id="new-search-btn" title="Nuova ricerca">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="m21 21-4.35-4.35"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="lyrics-divider"></div>
                
                <!-- Split View Panels -->
                <div class="lyrics-split-view" id="lyrics-split-view">
                    <!-- Original Lyrics Panel -->
                    <div class="lyrics-panel lyrics-panel-original">
                        <div class="panel-header">
                            <span class="panel-badge panel-badge-original">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                    <path d="M9 18V5l12-2v13"/>
                                    <circle cx="6" cy="18" r="3"/>
                                    <circle cx="18" cy="16" r="3"/>
                                </svg>
                                Originale
                            </span>
                            <span class="panel-lang" id="detected-lang"></span>
                        </div>
                        <div class="lyrics-body" id="lyrics-body"></div>
                    </div>
                    
                    <!-- Divider -->
                    <div class="split-divider"></div>
                    
                    <!-- Translation Panel -->
                    <div class="lyrics-panel lyrics-panel-translation">
                        <div class="panel-header">
                            <span class="panel-badge panel-badge-translation">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                                    <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
                                </svg>
                                Traduzione IT
                            </span>
                        </div>
                        <div class="lyrics-body lyrics-body-translation" id="lyrics-body-translation">
                            <div class="translation-loading" id="translation-loading">
                                <div class="translation-spinner"></div>
                                <span>Traduzione in corso...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Recent Searches -->
        <section class="recent-section hidden" id="recent-section">
            <h3 class="recent-title">Ricerche recenti</h3>
            <div class="recent-list" id="recent-list"></div>
        </section>

        <!-- Toast Notification -->
        <div class="toast hidden" id="toast">
            <span class="toast-text" id="toast-text"></span>
        </div>
    </div>

    <!-- Copy Success Overlay -->
    <div class="copy-overlay hidden" id="copy-overlay">
        <div class="copy-check">✓</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
